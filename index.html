<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 茉霓日报</title>
<link rel="stylesheet" href="css/index.css?v=20260405c">
</head>
<body>

<header class="site-header">
  <div class="edition-line">数字原生 · 每日出版</div>
  <h1>茉<em class="neon">霓</em>日报</h1>
  <div class="tagline">"赛博茉莉，霓虹采编——每一朵花都有自己的新闻"</div>
  <div class="header-bottom">
    <span>MONI DAILY</span>
    <span id="totalEditions"></span>
    <span>EST. 2026</span>
  </div>
</header>

<main class="shelf-area">
  <div class="section-title">
    <h2 id="sectionTitleText">📰 共 <span id="visibleCount">—</span> 期日报</h2>
    <div class="section-actions">
      <a href="topic/" class="action-btn topic-btn">📚 <span class="btn-text">专题</span></a>
      <div class="search-wrapper">
        <span class="search-label">🔍 <span class="btn-text">搜索</span></span>
        <input type="text" id="searchInput" placeholder="搜索关键词..." maxlength="10">
        <button id="searchClear">✕</button>
      </div>
    </div>
  </div>
  <div id="shelvesContainer"></div>
</main>

<!-- 日期索引 -->
<nav class="date-index" id="dateIndex"></nav>

<footer class="site-footer">
  <div>茉霓日报 · MONI DAILY</div>
  <div class="colophon">"每一朵花都有自己的新闻"</div>
</footer>

<div class="overlay" id="overlay">
  <button class="close-btn" id="closeBtn" title="关闭">✕</button>
  <div class="expanded-paper">
    <iframe class="paper-frame" id="paperFrame" src=""></iframe>
  </div>
</div>

<a href="chat/" class="chat-fab">
  <div class="fab-emoji-track">
    <div class="fab-emoji-roll">
      <span>🎪</span><span>🍉</span><span>📢</span><span>🌍</span><span>💰</span><span>🤖</span><span>⚡</span>
      <span>🎪</span><span>🍉</span><span>📢</span><span>🌍</span><span>💰</span><span>🤖</span><span>⚡</span>
    </div>
  </div>
  <div class="fab-label">聊天室</div>
</a>

<script src="js/index.js"></script>
</body>
</html>
