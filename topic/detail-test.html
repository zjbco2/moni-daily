              </div>
            </div>

          </div>
        </div>
      </div>
    </div>

</div>

    });

    const stancesByStance = computed(() => {
      const map = {};
      stances.value.forEach(s => {
        if (!map[s.stance]) map[s.stance] = { label: s.stance, phaseClass: stancePhaseMap[s.stance] || 'mediate', countries: [] };
        map[s.stance].countries.push(s);
      });
      return Object.values(map);
    });

    return { topic, articles, loading, error, timeline, stances, articlesByDate, dayCount, dateRange, formatDate, phaseOutbreak, phaseEscalation, phaseNegotiation, phaseReturn, stancesByStance };
  }
}).mount('#app');
</script>
