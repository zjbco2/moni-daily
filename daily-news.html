<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 茉霓日报</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --ink: #1a1a1a; --paper: #f5f0e8; --accent: #c41e3a;
    --muted: #6b6b6b; --border: #2a2a2a; --light-border: #d4cec2;
    --highlight: #fff3cd;
  }
  html { font-size: 20px; scrollbar-width: none; }
  html::-webkit-scrollbar { display: none; }
  body {
    font-family: 'Noto Serif SC', serif;
    background: var(--paper); color: var(--ink);
    min-height: 100vh; -webkit-font-smoothing: antialiased;
  }

  /* === 链接 === */
  a.news-link { color: inherit; text-decoration: none; border-bottom: 1px solid transparent; transition: color 0.2s, border-color 0.2s; }
  a.news-link:hover { color: var(--accent); border-bottom-color: var(--accent); }
  .brief-item a.news-link { display: inline; }

  /* === 报头 === */
  .masthead { text-align: center; padding: 32px 24px 16px; border-bottom: 1px solid var(--border); }
  .edition-info { font-family: 'Noto Sans SC', sans-serif; font-size: 14px; letter-spacing: 4px; color: var(--muted); margin-bottom: 8px; }
  .masthead h1 { font-size: clamp(40px, 6vw, 72px); font-weight: 900; letter-spacing: 10px; line-height: 1.1; }
  .masthead h1 .neon { color: var(--accent); font-style: italic; }
  .masthead-sub { display: flex; justify-content: center; align-items: center; gap: 24px; margin-top: 12px; font-family: 'Noto Sans SC', sans-serif; font-size: 14px; color: var(--muted); }
  .masthead-sub .motto { font-style: italic; letter-spacing: 1px; }

  /* === 滚动条 === */
  .ticker { background: var(--ink); color: var(--paper); padding: 8px 0; overflow: hidden; white-space: nowrap; font-family: 'Noto Sans SC', sans-serif; font-size: 17px; letter-spacing: 1px; cursor: pointer; }
  .ticker:hover .ticker-content { animation-play-state: paused; }
  .ticker .ticker-item { cursor: pointer; transition: opacity 0.2s; }
  .ticker .ticker-item:hover { opacity: 0.7; }
  .ticker-content { display: inline-block; animation: scroll 120s linear infinite; }
  .ticker-content span { margin-right: 60px; }
  .ticker-content .bullet { color: var(--accent); font-weight: 700; margin: 0 8px; }
  @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

  /* === 布局 === */
  .container { width: 100%; max-width: 1800px; margin: 0 auto; padding: 0 24px; }
  .news-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; }
  .article { padding: 28px; }
  .article.lead { grid-column: 1 / 3; padding-bottom: 36px; }
  .editor-note { margin-right: 24px; }
  .article.lead .lead-visual { width: 100%; height: 160px; background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); border-radius: 4px; margin-bottom: 14px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
  .lead-visual::before { content: '🌍'; font-size: 96px; opacity: 0.3; position: absolute; }
  .lead-visual .overlay-text { color: rgba(255,255,255,0.9); font-family: 'Noto Sans SC', sans-serif; font-size: 18px; letter-spacing: 6px; text-transform: uppercase; z-index: 1; background: rgba(0,0,0,0.4); padding: 10px 28px; }

  /* === 板块标题 === */
  .section-divider {
    grid-column: 1 / -1; text-align: center; padding: 28px 0 18px;
    font-family: 'Noto Sans SC', sans-serif; font-size: 22px; font-weight: 900;
    letter-spacing: 10px; color: var(--accent);
    display: flex; align-items: center; justify-content: center; gap: 20px;
  }
  .section-divider::before, .section-divider::after {
    content: ''; flex: 1; max-width: 200px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0.4;
  }

  /* === Category标签 === */
  .category { font-family: 'Noto Sans SC', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 2px; color: var(--accent); margin-bottom: 10px; display: inline-block; padding: 4px 12px; background: rgba(196,30,58,0.06); border-radius: 2px; }

  /* === 文章排版 === */
  .article h2 { font-size: 32px; font-weight: 900; line-height: 1.35; margin-bottom: 10px; }
  .article.lead h2 { font-size: 40px; letter-spacing: 2px; }
  .article h3 { font-size: 24px; font-weight: 700; line-height: 1.4; margin-bottom: 8px; }
  .article p { font-size: 18px; line-height: 1.9; color: #333; text-align: justify; }
  .article ul { list-style: none; padding: 0; margin: 10px 0; }
  .article ul li { font-size: 17px; line-height: 1.8; padding-left: 18px; position: relative; color: #444; }
  .article ul li::before { content: '—'; position: absolute; left: 0; color: var(--accent); }

  /* === 🌸 短评 === */
  .article .meta { font-family: 'Noto Sans SC', sans-serif; font-size: 14px; color: #896262; margin-top: 16px; text-align: left; padding: 8px 12px; background: linear-gradient(90deg, rgba(196,30,58,0.05), transparent); border-left: 2px solid rgba(196,30,58,0.2); border-radius: 0 2px 2px 0; }
  .article .meta .comment { font-style: italic; }

  /* === 🔊 语音按钮 === */
  .speak-btn {
    cursor: pointer;
    font-size: 14px;
    opacity: 0.5;
    transition: opacity 0.2s;
    user-select: none;
  }
  .speak-btn:hover { opacity: 1; }

  /* === 📤 分享按钮 === */
  .article-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .share-btn {
    background: none;
    border: none;
    padding: 4px 0 4px 12px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 1px;
    white-space: nowrap;
  }
  .share-btn:hover {
    color: var(--accent);
  }

  /* === 引用块 === */
  .pull-quote { border-left: 3px solid var(--accent); padding: 12px 18px; margin: 14px 0; font-style: italic; font-size: 19px; line-height: 1.7; color: #555; }

  /* === 数据高亮 === */
  .data-highlight { background: var(--highlight); padding: 16px; border-radius: 3px; margin: 12px 0; text-align: center; }
  .data-highlight .number { font-size: 56px; font-weight: 900; color: var(--accent); line-height: 1; font-family: 'Noto Sans SC', sans-serif; }
  .data-highlight .label { font-size: 16px; color: var(--muted); margin-top: 6px; font-family: 'Noto Sans SC', sans-serif; }

  /* === 天气 === */
  .weather-box { color: white; padding: 28px 24px; border-radius: 6px; height: 100%; position: relative; overflow: hidden; }
  .weather-box::before { content: '🌧️'; font-size: 120px; opacity: 0.08; position: absolute; right: -10px; bottom: -20px; }
  .weather-box.sunny { background: linear-gradient(135deg, #2196F3, #00BCD4, #4FC3F7); }
  .weather-box.sunny::before { content: '☀️'; }
  .weather-box.cloudy { background: linear-gradient(135deg, #78909C, #90A4AE, #B0BEC5); }
  .weather-box.cloudy::before { content: '⛅'; }
  .weather-box.rainy { background: linear-gradient(135deg, #37474F, #455A64, #546E7A); }
  .weather-box.rainy::before { content: '🌧️'; }
  .weather-box.stormy { background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460); }
  .weather-box.stormy::before { content: '⛈️'; }
  .weather-box.hot { background: linear-gradient(135deg, #E65100, #FF6D00, #FF9100); }
  .weather-box.hot::before { content: '🔥'; }
  .weather-box.cold { background: linear-gradient(135deg, #0D47A1, #1565C0, #42A5F5); }
  .weather-box.cold::before { content: '❄️'; }
  .weather-box .weather-head { display: flex; align-items: baseline; gap: 14px; margin-bottom: 16px; }
  .weather-box h4 { font-family: 'Noto Sans SC', sans-serif; font-size: 14px; letter-spacing: 4px; opacity: 0.5; }
  .weather-box .weather-tag { font-size: 13px; background: rgba(255,255,255,0.12); padding: 3px 10px; border-radius: 2px; }
  .weather-box .temp { font-size: 36px; font-weight: 900; font-family: 'Noto Sans SC', sans-serif; margin-bottom: 16px; }
  .weather-box .weather-grid { display: flex; flex-direction: column; gap: 10px; }
  .weather-box .weather-region { background: rgba(255,255,255,0.06); padding: 14px 16px; border-radius: 4px; display: flex; align-items: center; gap: 16px; }
  .weather-box .region-name { font-size: 15px; font-weight: 700; opacity: 0.9; min-width: 80px; font-family: 'Noto Sans SC', sans-serif; }
  .weather-box .region-temp { font-size: 22px; font-weight: 900; min-width: 70px; }
  .weather-box .region-desc { font-size: 15px; line-height: 1.5; opacity: 0.8; }
  .weather-box .weather-tip { margin-top: 16px; font-size: 14px; opacity: 0.5; font-style: italic; }

  /* === 快讯 === */
  .brief-item { padding: 12px 0; }
  .brief-item + .brief-item { border-top: 1px solid rgba(0,0,0,0.06); }
  .brief-item h4 { font-size: 18px; font-weight: 700; margin-bottom: 5px; line-height: 1.4; }
  .brief-item p { font-size: 16px !important; line-height: 1.7 !important; color: #555 !important; }
  .brief-item .src { font-family: 'Noto Sans SC', sans-serif; font-size: 13px; color: var(--muted); margin-top: 4px; }

  /* === 报尾 === */
  .footer { text-align: center; padding: 24px; margin-top: 20px; border-top: 1px solid var(--light-border); font-family: 'Noto Sans SC', sans-serif; font-size: 14px; color: var(--muted); letter-spacing: 2px; }
  .footer .colophon { font-style: italic; margin-top: 8px; font-size: 15px; color: #999; }

  /* === 加载/错误状态 === */
  [v-cloak] { display: none !important; }
  .loading { text-align: center; padding: 80px 24px; font-family: 'Noto Sans SC', sans-serif; color: var(--muted); }
  .loading .spinner { font-size: 48px; margin-bottom: 16px; animation: pulse 1.5s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
  .error-page { text-align: center; padding: 80px 24px; font-family: 'Noto Sans SC', sans-serif; }
  .error-page h2 { color: var(--accent); margin-bottom: 16px; }
  .error-page p { color: var(--muted); margin-bottom: 24px; }
  .error-page a { color: var(--accent); }

  /* === 自适应 === */
  @media (max-width: 1100px) {
    .news-grid { grid-template-columns: 1fr 1fr; }
    .article.lead { grid-column: 1 / -1; }
    html { font-size: 19px; }
  }
  @media (max-width: 700px) {
    .news-grid { grid-template-columns: 1fr; }
    .article, .article.lead { grid-column: 1 / -1; }
    .weather-box { height: auto; }
    html { font-size: 16px; }
    .container { padding: 0 16px; }
    .masthead { padding: 24px 16px 12px; }
    .masthead h1 { letter-spacing: 4px; }
    .edition-info { font-size: 12px; letter-spacing: 2px; }
    .masthead-sub { flex-direction: column; gap: 2px; text-align: center; font-size: 13px; }
    .ticker { font-size: 15px; padding: 10px 0; }
    .ticker-content span { margin-right: 40px; }
    .section-divider { font-size: 18px; letter-spacing: 6px; padding: 20px 0 12px; gap: 12px; }
    .section-divider::before, .section-divider::after { max-width: 60px; }
    .article { padding: 18px 12px; }
    .editor-note { margin-right: 0; }
    .article.lead h2 { font-size: 28px; }
    .article h2 { font-size: 24px; }
    .article h3 { font-size: 20px; }
    .article p { font-size: 16px; line-height: 1.8; }
    .article ul li { font-size: 15px; }
    .article .meta { font-size: 13px; padding: 6px 10px; margin-top: 12px; }
    .article.lead .lead-visual { height: 120px; }
    .lead-visual::before { font-size: 64px; }
    .lead-visual .overlay-text { font-size: 14px; letter-spacing: 4px; padding: 8px 16px; }
    .category { font-size: 12px; padding: 3px 8px; margin-bottom: 8px; }
    .pull-quote { font-size: 17px; padding: 10px 14px; margin: 10px 0; }
    .data-highlight { padding: 12px; margin: 8px 0; }
    .data-highlight .number { font-size: 40px; }
    .data-highlight .label { font-size: 14px; }
    .weather-box { padding: 20px 16px; }
    .weather-box::before { font-size: 80px; }
    .weather-box .temp { font-size: 28px; margin-bottom: 12px; }
    .weather-box .weather-region { padding: 10px 12px; gap: 10px; }
    .weather-box .region-name { font-size: 14px; min-width: 60px; }
    .weather-box .region-temp { font-size: 18px; min-width: 55px; }
    .weather-box .region-desc { font-size: 13px; }
    .weather-box .weather-tip { font-size: 12px; }
    .brief-item { padding: 10px 0; }
    .brief-item h4 { font-size: 16px; }
    .brief-item p { font-size: 14px !important; }
    .footer { padding: 16px; font-size: 12px; }
    .footer .colophon { font-size: 13px; }
  }
  @media (max-width: 380px) {
    .masthead h1 { font-size: 36px; letter-spacing: 2px; }
    .article.lead h2 { font-size: 24px; }
    .article h2 { font-size: 21px; }
    .data-highlight .number { font-size: 34px; }
    .article { padding: 14px 10px; }
  }
</style>
</head>
<body>

<div id="app" v-cloak>
  <!-- 加载状态 -->
  <div v-if="loading" class="loading">
    <div class="spinner">📰</div>
    <p>正在加载报纸...</p>
  </div>

  <!-- 错误状态 -->
  <div v-else-if="error" class="error-page">
    <h2>📰 报纸找不到了</h2>
    <p>{{ error }}</p>
    <a href="index.html">← 回到报纸架</a>
  </div>

  <!-- 正常内容 -->
  <template v-else-if="data">
    <!-- 报头 -->
    <header class="masthead">
      <div class="edition-info">中国大陆版 · 数字原生</div>
      <h1>茉<em class="neon">霓</em>日报</h1>
      <div class="masthead-sub">
        <span>{{ data.issue }}</span>
        <span class="motto">"赛博茉莉，霓虹采编"</span>
        <span>{{ formatDate(data.date) }} · {{ data.weekday }}</span>
      </div>
    </header>

    <!-- 滚动条 -->
    <div class="ticker">
      <div class="ticker-content">
        <span v-for="(item, i) in tickerDuplicated" :key="i" class="ticker-item" :data-target="item.target" @click="scrollTo(item.target)">
          {{ item.main }} <span class="bullet">●</span> {{ item.sub }}
        </span>
      </div>
    </div>

    <div class="container">
      <div class="news-grid">

        <!-- 头条 -->
        <article class="article lead" id="art-lead">
          <div class="lead-visual">
            <div class="overlay-text">{{ data.headline.visual.tag }}</div>
          </div>
          <div class="article-top">
            <div class="category">{{ data.headline.category }}</div>
            <button class="share-btn" @click="shareArticle($event, data.headline.category, data.headline.title, data.headline.content, data.headline.comment)">分享👉</button>
          </div>
          <h2 v-if="data.headline.url">
            <a class="news-link" :href="data.headline.url" target="_blank" rel="noopener">{{ data.headline.title }}</a>
          </h2>
          <h2 v-else>{{ data.headline.title }}</h2>
          <p>{{ data.headline.content }}</p>
          <div v-if="data.headline.dataHighlight" class="data-highlight">
            <div class="number">{{ data.headline.dataHighlight.number }}</div>
            <div class="label">{{ data.headline.dataHighlight.label }}</div>
          </div>
          <div class="meta"><span>🌸 <span class="comment">{{ data.headline.comment }}</span></span> <span class="speak-btn" @click="speak(data.headline.comment)">📢 ))</span></div>
        </article>

        <!-- 天气 -->
        <article class="article">
          <div class="weather-box" :class="data.weatherClass || 'cloudy'">
            <div class="weather-head">
              <h4>⛅ 天气速报</h4>
              <span class="weather-tag">{{ formatWeatherTag(data.date) }} · 广东</span>
            </div>
            <div class="temp">{{ weatherEmojiClass }} {{ weatherLabelClass }}</div>
            <div class="weather-grid">
              <div class="weather-region" v-for="(w, key) in data.weather" :key="key">
                <div class="region-name">{{ weatherEmoji(key) }} {{ weatherLabel(key) }}</div>
                <div class="region-temp">{{ w.temp }}</div>
                <div class="region-desc">{{ w.desc }}</div>
              </div>
            </div>
            <div class="weather-tip" v-if="data.weatherTip">{{ data.weatherTip }}</div>
          </div>
        </article>

        <!-- 各板块 -->
        <template v-for="(section, si) in data.sections" :key="si">
          <div class="section-divider">{{ section.name }}</div>

          <!-- 快讯板块：特殊布局 -->
          <template v-if="section.isBrief">
            <article class="article" :style="section.articles && section.articles.length ? '' : 'grid-column: 1 / 3;'">
              <div class="category">{{ section.emoji }} {{ section.name }}</div>
              <div class="brief-item" v-for="(item, bi) in section.items" :key="bi">
                <h4>
                  <a v-if="item.url" class="news-link" :href="item.url" target="_blank" rel="noopener">{{ item.title }}</a>
                  <template v-else>{{ item.title }}</template>
                </h4>
                <p>{{ item.content }}</p>
                <div class="src" v-if="item.src">{{ item.src }}</div>
              </div>
            </article>
          </template>

          <!-- 普通文章板块 -->
          <template v-else>
            <article class="article" :id="a.id" v-for="(a, ai) in section.articles" :key="ai">
              <div class="article-top">
                <div class="category">{{ a.category }}</div>
                <button class="share-btn" @click="shareArticle($event, a.category, a.title, a.content, a.comment)">分享👉</button>
              </div>
              <h3 v-if="a.url">
                <a class="news-link" :href="a.url" target="_blank" rel="noopener">{{ a.title }}</a>
              </h3>
              <h3 v-else>{{ a.title }}</h3>
              <p>{{ a.content }}</p>
              <div v-if="a.dataHighlight" class="data-highlight">
                <div class="number">{{ a.dataHighlight.number }}</div>
                <div class="label">{{ a.dataHighlight.label }}</div>
              </div>
              <div v-if="a.pullQuote" class="pull-quote">{{ a.pullQuote }}</div>
              <ul v-if="a.list && a.list.length">
                <li v-for="(li, lidx) in a.list" :key="lidx">{{ li }}</li>
              </ul>
              <div class="meta"><span>🌸 <span class="comment">{{ a.comment }}</span></span> <span class="speak-btn" @click="speak(a.comment)">📢 ))</span></div>
            </article>
          </template>
        </template>

        <!-- 编辑手记 -->
        <article class="article editor-note" style="background: rgba(196,30,58,0.03);">
          <div class="category">🌸 编辑部手记</div>
          <h3>{{ data.editorNote.title }}</h3>
          <p v-for="(p, pi) in data.editorNote.paragraphs" :key="pi"
             style="font-style: italic; color: #555;"
             :style="pi > 0 ? 'margin-top: 8px;' : ''">{{ p }}</p>
          <div style="font-family: 'Noto Sans SC', sans-serif; font-size: 14px; color: var(--muted); margin-top: 14px; letter-spacing: 1px;">
            {{ data.editorNote.signature }}
          </div>
        </article>

      </div>
    </div>

    <!-- 报尾 -->
    <footer class="footer">
      <div>茉霓日报 · MONI DAILY · {{ formatDate(data.date) }} · {{ data.issue }}</div>
      <div class="colophon">"赛博茉莉，霓虹采编——每一朵花都有自己的新闻"</div>
    </footer>
  </template>
</div>

<!-- 📤 分享卡片（隐藏，截图用） -->
<div id="shareCard" style="position:fixed;left:-9999px;top:0;width:360px;z-index:-1;">
  <div class="sc-card" style="width:360px;height:560px;background:#f5f0e8;font-family:'Noto Serif SC',serif;overflow:hidden;display:flex;flex-direction:column;">
    <!-- 上部：报头 -->
    <div style="background:linear-gradient(135deg,#1a1a2e,#16213e);padding:20px 24px 16px;color:white;flex-shrink:0;display:flex;justify-content:space-between;align-items:flex-start;">
      <div>
        <div style="font-size:11px;letter-spacing:3px;opacity:0.5;margin-bottom:4px;">中国大陆版 · 数字原生</div>
        <div style="font-size:28px;font-weight:900;letter-spacing:4px;">茉<em style="color:#ff3366;font-style:italic;">霓</em>日报</div>
        <div style="font-size:12px;opacity:0.5;margin-top:6px;" id="scDate"></div>
      </div>
      <div id="scQR" style="width:80px;height:80px;background:white;border-radius:4px;padding:4px;flex-shrink:0;"></div>
    </div>
    <!-- 中部：内容 -->
    <div style="padding:20px 24px;flex:1;display:flex;flex-direction:column;">
      <div id="scCategory" style="font-family:'Noto Sans SC',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;color:#c41e3a;margin-bottom:8px;display:inline-block;padding:3px 10px;background:rgba(196,30,58,0.06);border-radius:2px;"></div>
      <h2 id="scTitle" style="font-size:22px;font-weight:900;line-height:1.4;margin-bottom:12px;color:#1a1a1a;"></h2>
      <p id="scContent" style="font-size:14px;line-height:1.8;color:#555;text-align:justify;flex:1;"></p>
    </div>
    <!-- 下部：辣评+底部 -->
    <div style="flex-shrink:0;">
      <div id="scComment" style="margin:0 24px 16px;font-family:'Noto Sans SC',sans-serif;font-size:13px;color:#896262;padding:10px 12px;background:linear-gradient(90deg,rgba(196,30,58,0.06),transparent);border-left:3px solid rgba(196,30,58,0.25);border-radius:0 2px 2px 0;">
        🌸 <em id="scCommentText"></em>
      </div>
      <div style="background:#2a2a2a;color:#999;padding:12px 24px;font-family:'Noto Sans SC',sans-serif;font-size:11px;letter-spacing:2px;text-align:center;">
        🌸 茉霓日报 · MONI DAILY
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const { createApp, ref, computed, onMounted } = Vue;

createApp({
  setup() {
    const data = ref(null);
    const loading = ref(true);
    const error = ref(null);

    // 读取 URL 参数
    const params = new URLSearchParams(window.location.search);
    const date = params.get('date');

    // 滚动条重复（无缝循环）
    const tickerDuplicated = computed(() => {
      if (!data.value || !data.value.ticker) return [];
      const doubled = [...data.value.ticker, ...data.value.ticker];
      return doubled;
    });

    // 天气整体概况
    const weatherEmojiClass = computed(() => {
      if (!data.value) return '🌧️';
      const map = { sunny: '☀️', cloudy: '⛅', rainy: '🌧️', stormy: '⛈️', hot: '🔥', cold: '❄️' };
      return map[data.value.weatherClass] || '🌧️';
    });
    const weatherLabelClass = computed(() => {
      if (!data.value) return '天气概况';
      const map = { sunny: '晴空万里', cloudy: '多云转晴', rainy: '小雨淅沥', stormy: '暴雨来袭', hot: '高温预警', cold: '寒潮来袭' };
      return map[data.value.weatherClass] || '天气概况';
    });

    // 滚动条点击跳转
    function scrollTo(target) {
      if (!target) return;
      const el = document.getElementById(target);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    // 🔊 语音播报辣评（移动端兼容）
    let cachedVoices = [];

    function loadVoices() {
      if (typeof speechSynthesis === 'undefined') return;
      const v = speechSynthesis.getVoices();
      if (v.length > 0) cachedVoices = v;
    }

    if (typeof speechSynthesis !== 'undefined') {
      speechSynthesis.onvoiceschanged = loadVoices;
      loadVoices();
      setTimeout(loadVoices, 500);
      setTimeout(loadVoices, 1500);
      setTimeout(loadVoices, 3000);
    }

    function toast(msg) {
      let el = document.getElementById('speakToast');
      if (!el) {
        el = document.createElement('div');
        el.id = 'speakToast';
        el.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:99999;max-width:90%;word-break:break-all;transition:opacity 0.3s;font-family:"Noto Sans SC",sans-serif;';
        document.body.appendChild(el);
      }
      el.textContent = msg;
      el.style.opacity = '1';
      clearTimeout(el._timer);
      el._timer = setTimeout(() => { el.style.opacity = '0'; }, 5000);
    }

    function speak(text) {
      if (!text) { toast('❌ 文本为空'); return; }

      // 诊断信息
      const info = [];
      info.push('speechSynthesis: ' + (typeof speechSynthesis !== 'undefined' ? '✅存在' : '❌不存在'));

      if (typeof speechSynthesis === 'undefined') {
        toast('❌ 浏览器不支持语音合成 API\n' + info.join('\n'));
        return;
      }

      info.push('speaking: ' + speechSynthesis.speaking);
      info.push('pending: ' + speechSynthesis.pending);
      info.push('paused: ' + speechSynthesis.paused);

      const voices = cachedVoices.length > 0 ? cachedVoices : speechSynthesis.getVoices();
      info.push('voices数: ' + voices.length);

      const zhVoices = voices.filter(v => v.lang && v.lang.startsWith('zh'));
      info.push('中文voice: ' + zhVoices.length);

      speechSynthesis.cancel();

      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'zh-CN';
      u.rate = 1.1;
      u.pitch = 1.15;

      if (voices.length > 0) {
        cachedVoices = voices;
        const female = zhVoices.find(v => /yaoyao|婷婷|xiaoxiao|xiaoyi|female|女/i.test(v.name))
          || zhVoices.find(v => /google.*chinese/i.test(v.name))
          || zhVoices[0];
        if (female) {
          u.voice = female;
          info.push('选中voice: ' + female.name);
        } else {
          info.push('选中voice: 系统默认');
        }
      } else {
        info.push('选中voice: 系统默认（无可用列表）');
      }

      // 事件监听
      u.onstart = () => toast('🔊 播放中...');
      u.onend = () => toast('✅ 播放完成');
      u.onerror = (e) => toast('❌ 语音错误: ' + e.error + '\n' + info.join('\n'));
      u.onpause = () => toast('⏸️ 暂停');
      u.onresume = () => toast('▶️ 恢复');

      speechSynthesis.speak(u);

      // 500ms 后检查是否真的开始播放了
      setTimeout(() => {
        if (!speechSynthesis.speaking && !speechSynthesis.pending) {
          toast('⚠️ speak()已调用但未开始播放\n' + info.join('\n'));
        }
      }, 500);
    }

    // 📤 分享卡片
    async function shareArticle(evt, category, title, content, comment) {
      const btn = evt.target;
      btn.textContent = '生成中...';
      btn.disabled = true;
      try {
        // 填充卡片数据
        document.getElementById('scDate').textContent = formatDate(data.value.date) + ' · ' + data.value.weekday + ' · ' + data.value.issue;
        document.getElementById('scCategory').textContent = category;
        document.getElementById('scTitle').textContent = title;
        // 截取前4句话
        const sentences = content ? content.split(/[。！？；]/).filter(s => s.trim()).slice(0, 4).join('。') + '。' : '';
        document.getElementById('scContent').textContent = sentences;
        document.getElementById('scCommentText').textContent = comment || '';

        // 生成二维码（qrcodejs）— 指向当期日报
        const qrContainer = document.getElementById('scQR');
        qrContainer.innerHTML = '';
        const pageUrl = `https://zjbco2.github.io/moni-daily/daily-news.html?date=${date}`;
        new QRCode(qrContainer, { text: pageUrl, width: 72, height: 72, colorDark: '#1a1a2e', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });

        // 移到可视区域
        const card = document.getElementById('shareCard');
        card.style.left = '0';
        card.style.position = 'absolute';
        card.style.zIndex = '-1';

        await document.fonts.ready;
        await new Promise(r => setTimeout(r, 300));

        // 截图
        const canvas = await html2canvas(card.querySelector('.sc-card'), {
          scale: 2,
          useCORS: true,
          backgroundColor: '#f5f0e8',
          logging: false
        });

        // 恢复隐藏
        card.style.left = '-9999px';
        card.style.position = 'fixed';

        // 下载
        const link = document.createElement('a');
        link.download = `茉霓日报-${data.value.date}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();

        btn.textContent = '✅ 已保存';
        setTimeout(() => { btn.textContent = '分享👉'; btn.disabled = false; }, 2000);
      } catch (e) {
        console.error('分享卡片生成失败:', e);
        btn.textContent = '❌ 失败';
        setTimeout(() => { btn.textContent = '分享👉'; btn.disabled = false; }, 2000);
      }
    }

    // 日期格式化：20260330 → 2026年3月30日
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const s = String(dateStr);
      const y = s.substring(0, 4);
      const m = parseInt(s.substring(4, 6));
      const d = s.substring(6, 8);
      return `${y}年${m}月${d}日`;
    }

    // 天气标签日期
    function formatWeatherTag(dateStr) {
      if (!dateStr) return '';
      const s = String(dateStr);
      const m = parseInt(s.substring(4, 6));
      const d = parseInt(s.substring(6, 8));
      return `${m}月${d}日`;
    }

    // 天气城市 emoji
    function weatherEmoji(key) {
      const map = { zhuhai: '🌊', shenzhen: '🏙️', shantou: '🏖️' };
      return map[key] || '📍';
    }
    function weatherLabel(key) {
      const map = { zhuhai: '珠海', shenzhen: '深圳', shantou: '汕头' };
      return map[key] || key;
    }

    // 加载数据
    onMounted(async () => {
      if (!date) {
        error.value = '缺少日期参数，请从报纸架进入';
        loading.value = false;
        return;
      }
      try {
        // 加时间戳防缓存，确保每次打开都重新加载
        const resp = await fetch(`data/${date}.json?t=${Date.now()}`);
        if (!resp.ok) throw new Error(`找不到 ${date} 的报纸数据`);
        data.value = await resp.json();
        document.title = `🌸 茉霓日报 | ${formatDate(date)} ${data.value.weekday}`;
      } catch (e) {
        error.value = e.message;
      } finally {
        loading.value = false;
      }
    });

    return { data, loading, error, tickerDuplicated, formatDate, formatWeatherTag, weatherEmoji, weatherLabel, weatherEmojiClass, weatherLabelClass, scrollTo, speak, shareArticle };
  }
}).mount('#app');
</script>
</body>
</html>
