<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlexSearch 混合分词 POC v2 - 茉霓日报</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; padding: 28px 32px; }
  h1 { font-size: 18px; margin-bottom: 6px; color: #58a6ff; }
  p { font-size: 13px; color: #8b949e; margin-bottom: 18px; }

  .stats { display: flex; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 10px 18px; min-width: 110px; }
  .stat-label { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-value { font-size: 20px; font-weight: 600; color: #58a6ff; margin-top: 3px; }

  .search-bar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
  input {
    flex: 1; padding: 13px 16px; font-size: 16px;
    background: #161b22; border: 1px solid #30363d; border-radius: 8px;
    color: #e6edf3; outline: none; transition: border-color 0.2s;
  }
  input:focus { border-color: #58a6ff; }

  .test-queries { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .test-btn { background: #1c2128; border: 1px solid #30363d; border-radius: 6px; padding: 5px 13px; font-size: 12px; color: #8b949e; cursor: pointer; transition: all 0.15s; }
  .test-btn:hover { border-color: #58a6ff; color: #58a6ff; }
  .test-btn.active { border-color: #b052e8; color: #b052e8; background: #1c1433; }

  .perf { display: flex; gap: 12px; margin-bottom: 16px; font-size: 13px; flex-wrap: wrap; align-items: center; }
  .perf-item { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 9px 14px; }
  .perf-label { color: #8b949e; font-size: 12px; }
  .perf-value { font-weight: 600; margin-left: 6px; }

  .compare { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  @media (max-width: 800px) { .compare { grid-template-columns: 1fr; } }

  .panel { background: #161b22; border: 1px solid #30363d; border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; }
  .panel-header { padding: 9px 16px; background: #1c2128; border-bottom: 1px solid #30363d; font-size: 12px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
  .panel-count { color: #8b949e; font-size: 12px; }
  .panel-count .n { font-weight: 700; color: #e6edf3; }
  .panel-body { padding: 14px; min-height: 260px; max-height: 380px; overflow-y: auto; flex: 1; }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

  .result-item { padding: 9px 0; border-bottom: 1px solid #21262d; font-size: 13px; }
  .result-item:last-child { border-bottom: none; }
  .result-item .title { color: #e6edf3; margin-bottom: 3px; line-height: 1.4; }
  .result-item .meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .result-item .tag { background: #1c2128; border: 1px solid #30363d; border-radius: 4px; padding: 1px 5px; font-size: 10px; color: #8b949e; }
  .result-item .date { font-size: 11px; color: #484f58; }
  .result-item .comment { color: #f0883e; font-size: 11px; margin-top: 2px; }
  .hl { color: #79c0ff; background: #1f3a5f; padding: 0 2px; border-radius: 2px; }
  .result-empty { color: #484f58; font-size: 13px; text-align: center; padding: 40px 0; }

  .log { background: #0d1117; border: 1px solid #21262d; border-radius: 8px; padding: 10px 14px; font-family: 'Courier New', monospace; font-size: 11px; max-height: 130px; overflow-y: auto; color: #484f58; }
  .log-entry { margin-bottom: 2px; }
  .log-entry.ok { color: #3fb950; }
  .log-entry.info { color: #58a6ff; }
  .log-entry .ts { color: #484f58; margin-right: 7px; }

  .method-tag { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 3px; }
  .method-bigram { background: #1a3320; color: #3fb950; }
  .method-char { background: #1a2a33; color: #79c0ff; }
  .method-english { background: #2a1a33; color: #b052e8; }
</style>
</head>
<body>

<h1>🔍 FlexSearch 混合分词 POC v2 <span style="font-size:13px;color:#8b949e;font-weight:400;margin-left:8px;">单字+二元组+英文混合索引</span></h1>
<p>验证混合分词方案：中文单字索引（保证召回）+ 中文二元组（精确匹配）+ 英文单词（标准分词）</p>

<div class="stats">
  <div class="stat"><div class="stat-label">文章总数</div><div class="stat-value" id="s-count">—</div></div>
  <div class="stat"><div class="stat-label">索引进度</div><div class="stat-value" id="s-idx">—</div></div>
  <div class="stat"><div class="stat-label">建索引耗时</div><div class="stat-value" id="s-time">—</div></div>
</div>

<div class="search-bar">
  <input id="q" placeholder="输入关键词搜索..." oninput="handleSearch(this.value)">
</div>

<div class="test-queries" id="testQueries">
  <button class="test-btn" onclick="runTest('伊朗', this)">伊朗</button>
  <button class="test-btn" onclick="runTest('霍尔木兹', this)">霍尔木兹</button>
  <button class="test-btn" onclick="runTest('DeepSeek', this)">DeepSeek</button>
  <button class="test-btn" onclick="runTest('创业板', this)">创业板</button>
  <button class="test-btn" onclick="runTest('机器人', this)">机器人</button>
  <button class="test-btn" onclick="runTest('特朗普', this)">特朗普</button>
  <button class="test-btn" onclick="runTest('A股', this)">A股</button>
  <button class="test-btn" onclick="runTest('小米', this)">小米</button>
  <button class="test-btn" onclick="runTest('法拉利', this)">法拉利</button>
  <button class="test-btn" onclick="runTest('关税', this)">关税</button>
</div>

<div class="perf" id="perf"></div>

<div class="compare">
  <div class="panel">
    <div class="panel-header">
      <span>🐢 原生 includes（现有方案）</span>
      <span class="panel-count">共 <span class="n" id="native-count">0</span> 期</span>
    </div>
    <div class="panel-body" id="native-results"><div class="result-empty">输入关键词开始对比</div></div>
  </div>
  <div class="panel">
    <div class="panel-header">
      <span>⚡ FlexSearch 混合方案（改造后）</span>
      <span class="panel-count">共 <span class="n" id="flex-count">0</span> 期</span>
    </div>
    <div class="panel-body" id="flex-results"><div class="result-empty">输入关键词开始对比</div></div>
  </div>
</div>

<div class="log" id="log"></div>

<script src="https://cdn.jsdelivr.net/npm/flexsearch@0.7.43/dist/flexsearch.bundle.min.js"></script>
<script>
// ============================================================
// 核心：混合分词引擎
// ============================================================

function log(msg, type='info') {
  const el = document.createElement('div');
  el.className = 'log-entry ' + type;
  el.innerHTML = `<span class="ts">${new Date().toLocaleTimeString()}</span>${msg}`;
  document.getElementById('log').appendChild(el);
  document.getElementById('log').scrollTop = 1e9;
}

// 从文本中提取所有连续中文字符串
function extractChinese(text) {
  const result = [];
  const SEG = /[\u4e00-\u9fff]+/g;
  let m;
  while ((m = SEG.exec(text)) !== null) result.push(m[0]);
  return result;
}

// 中文文本 → 字符数组 + 二元组
function tokenizeChinese(text) {
  const chars = [];
  const segs = extractChinese(text);
  for (const seg of segs) {
    for (let i = 0; i < seg.length; i++) chars.push(seg[i]);
    if (seg.length > 1) {
      for (let i = 0; i < seg.length - 1; i++) chars.push(seg[i] + seg[i+1]);
    }
  }
  return chars;
}

// 英文单词提取
function tokenizeEnglish(text) {
  return text.match(/[a-zA-Z0-9]{2,}/g) || [];
}

// 完整分词：返回 { chars[], bigrams[], english[], raw: '' }
function tokenize(text) {
  if (!text) return { chars: [], bigrams: [], english: [], raw: '' };
  text = text.toLowerCase();
  return {
    chars: tokenizeChinese(text),
    bigrams: tokenizeChinese(text).filter(t => t.length === 2),
    english: tokenizeEnglish(text),
    raw: text
  };
}

// 把分词结果合并成一个搜索字符串（供 FlexSearch 使用）
function toSearchTokens(tok) {
  return [...tok.bigrams, ...tok.chars, ...tok.english].join(' ');
}

// ============================================================
// 搜索
// ============================================================

let index = null;
let articles = new Map();  // id → article
let articleList = [];

// ---------- 原生 includes ----------
function nativeSearch(query) {
  const q = query.toLowerCase();
  const matchedEditions = new Set();
  const results = [];
  for (const a of articleList) {
    const text = [a.title, a.preview, a.comment, a.category, a.section].join(' ').toLowerCase();
    if (text.includes(q)) {
      if (!matchedEditions.has(a.editionId)) {
        matchedEditions.add(a.editionId);
        results.push(a);
      }
    }
  }
  return results;
}

// ---------- FlexSearch 混合 ----------
function flexSearch(query) {
  const tok = tokenize(query);
  const searchStr = toSearchTokens(tok);
  
  if (!searchStr.trim()) return [];

  const raw = index.search(searchStr, {
    limit: 100,
    enrich: true
  });

  // 收集所有匹配的文章，按 score 排序
  const scores = new Map(); // id → {score, matchedTokens}
  raw.forEach(fieldResult => {
    if (!fieldResult.result) return;
    fieldResult.result.forEach(r => {
      if (!scores.has(r.id)) {
        scores.set(r.id, { score: 0, article: articles.get(r.id) || r.doc });
      }
      // 每个字段匹配 +1 分（bigram 匹配权重更高，通过重复 token 实现）
      scores.get(r.id).score += 1;
    });
  });

  // 转为数组，按分数降序，取有 article 的
  const sorted = Array.from(scores.values())
    .filter(s => s.article)
    .sort((a, b) => b.score - a.score);

  // 按 editionId 去重（每期只保留最高分那篇），保持分数排序
  const seen = new Set();
  const deduped = [];
  for (const { article, score } of sorted) {
    if (!seen.has(article.editionId)) {
      seen.add(article.editionId);
      deduped.push(article);
    }
  }
  return deduped;
}

// ============================================================
// 高亮渲染
// ============================================================

function highlight(text, query) {
  if (!query || !text) return text || '';
  const words = query.trim().split(/\s+/).filter(w => w.length > 0);
  if (!words.length) return text;
  // 中文：直接替换；英文：单词边界
  words.forEach(w => {
    if (/[\u4e00-\u9fff]/.test(w)) {
      text = text.replace(new RegExp(w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g'),
        m => `<mark class="hl">${m}</mark>`);
    } else {
      text = text.replace(new RegExp('\\b' + w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'gi'),
        m => `<mark class="hl">${m}</mark>`);
    }
  });
  return text;
}

function renderItem(a, query) {
  return `
    <div class="result-item">
      <div class="title">${highlight(a.title, query)}</div>
      <div class="meta">
        <span class="tag">${a.section}</span>
        <span class="tag">${a.category}</span>
        <span class="date">${a.date} · ${a.issue}</span>
      </div>
      ${a.comment ? `<div class="comment">💬 ${highlight(a.comment, query)}</div>` : ''}
    </div>`;
}

function renderList(id, results, query) {
  const el = document.getElementById(id);
  if (!results.length) {
    el.innerHTML = '<div class="result-empty">没有找到相关文章</div>';
    return;
  }
  el.innerHTML = results.slice(0, 30).map(a => renderItem(a, query)).join('');
  el.scrollTop = 0;
}

// ============================================================
// 初始化
// ============================================================

async function init() {
  log('📡 加载 search-index.json...');
  const t0 = Date.now();
  const res = await fetch('data/meta/search-index.json?t=' + Date.now());
  const data = await res.json();
  articleList = data.articles || [];
  document.getElementById('s-count').textContent = articleList.length + ' 篇';
  log(`✅ 加载 ${articleList.length} 篇，${(JSON.stringify(data).length/1024).toFixed(1)}KB，${Date.now()-t0}ms`);

  articleList.forEach(a => articles.set(a.id, a));

  log('🔧 构建 FlexSearch 混合索引...');
  const t1 = Date.now();

  // 每个字段用 encode:false 让 FlexSearch 直接存储我们预处理好的 tokens
  index = new FlexSearch.Document({
    document: {
      id: 'id',
      index: [
        { field: 'title_tok',   tokenize: 'strict', encode: false },
        { field: 'preview_tok', tokenize: 'strict', encode: false },
        { field: 'comment_tok', tokenize: 'strict', encode: false },
        { field: 'section',     tokenize: 'strict', encode: 'simple' },
        { field: 'category',    tokenize: 'strict', encode: 'simple' },
      ],
      store: ['id', 'editionId', 'date', 'issue', 'title', 'preview', 'comment', 'section', 'category']
    },
    tokenize: 'strict',
    resolution: 9,
    cache: 100,
  });

  for (let i = 0; i < articleList.length; i++) {
    const a = articleList[i];
    const titleTok = tokenize(a.title || '');
    const previewTok = tokenize(a.preview || '');
    const commentTok = tokenize(a.comment || '');

    index.add({
      id: a.id,
      editionId: a.editionId,
      date: a.date,
      issue: a.issue,
      title: a.title,
      preview: a.preview,
      comment: a.comment,
      section: a.section,
      category: a.category,
      // 预处理后的搜索 tokens（encode:false → FlexSearch 直接当原始文本存，不二次分词）
      title_tok:   [titleTok.bigrams.join(' '), titleTok.chars.join(' '), titleTok.english.join(' ')].filter(Boolean).join(' '),
      preview_tok: [previewTok.bigrams.join(' '), previewTok.chars.join(' '), previewTok.english.join(' ')].filter(Boolean).join(' '),
      comment_tok: [commentTok.bigrams.join(' '), commentTok.chars.join(' '), commentTok.english.join(' ')].filter(Boolean).join(' '),
    });

    if (i % 100 === 0) document.getElementById('s-idx').textContent = `${i}/${articleList.length}`;
  }

  const idxMs = Date.now() - t1;
  document.getElementById('s-idx').textContent = '✅';
  document.getElementById('s-time').textContent = idxMs + 'ms';
  log(`✅ 索引构建完成，耗时 ${idxMs}ms`);

  // 自动演示
  ['伊朗', '霍尔木兹', 'DeepSeek', '创业板', 'A股'].forEach((q, i) => {
    setTimeout(() => { runTest(q, null); }, i * 120);
  });
}

// ============================================================
// 搜索入口
// ============================================================

let activeBtn = null;

function runTest(query, btn) {
  if (activeBtn) activeBtn.classList.remove('active');
  if (btn) { btn.classList.add('active'); activeBtn = btn; }
  document.getElementById('q').value = query;
  handleSearch(query);
}

function handleSearch(query) {
  if (!query || !index) return;

  const t0 = Date.now();
  const nativeResults = nativeSearch(query);
  const nativeMs = Date.now() - t0;

  const t1 = Date.now();
  const flexResults = flexSearch(query);
  const flexMs = Date.now() - t1;

  document.getElementById('native-count').textContent = nativeResults.length;
  document.getElementById('flex-count').textContent = flexResults.length;

  renderList('native-results', nativeResults, query);
  renderList('flex-results', flexResults, query);

  const speedup = nativeMs > 0 ? (nativeMs / Math.max(flexMs, 1)).toFixed(1) + 'x' : '—';
  const qTokens = tokenize(query);
  const tokenDesc = [
    qTokens.bigrams.length ? `<span class="method-tag method-bigram">bigram:${qTokens.bigrams.join(',')}</span>` : '',
    qTokens.chars.length ? `<span class="method-tag method-char">char:${qTokens.chars.slice(0,6).join('')}${qTokens.chars.length>6?'…':''}</span>` : '',
    qTokens.english.length ? `<span class="method-tag method-english">en:${qTokens.english.join(',')}</span>` : '',
  ].filter(Boolean).join(' ');

  document.getElementById('perf').innerHTML = `
    <div class="perf-item">
      <span class="perf-label">原生</span><span class="perf-value" style="color:#8b949e">${nativeMs}ms</span>
      <span class="perf-label" style="margin-left:8px">原生召回</span><span class="perf-value" style="color:#e6edf3">${nativeResults.length}期</span>
    </div>
    <div class="perf-item">
      <span class="perf-label">Flex</span><span class="perf-value" style="color:#3fb950">${flexMs}ms</span>
      <span class="perf-label" style="margin-left:8px">Flex召回</span><span class="perf-value" style="color:${flexResults.length >= nativeResults.length ? '#3fb950' : '#d29922'}">${flexResults.length}期</span>
    </div>
    <div class="perf-item" style="font-size:12px; color:#8b949e;">
      <span class="perf-label">Query分词：</span>${tokenDesc}
    </div>
  `;

  log(`🔍 "${query}" → ${tokenDesc.replace(/<[^>]+>/g,'')} | 原生${nativeResults.length}期/${nativeMs}ms | Flex${flexResults.length}期/${flexMs}ms ${speedup}`, 'ok');
}

init();
</script>
</body>
</html>
