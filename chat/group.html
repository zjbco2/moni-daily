<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌸 茉霓日报群</title>
<link rel="stylesheet" href="../css/chat.css">
<style>
  [v-cloak] { display: none !important; }
</style>
</head>
<body>

<div id="app" v-cloak style="display:flex;flex-direction:column;height:100vh;background:#f0ebe2;position:relative;">

  <div class="chat-detail" id="chatDetail">

    <!-- 日期分隔 -->
    <div class="date-separator" v-if="data">
      <span>{{ formatDate(data.date) }} · {{ data.weekday }}</span>
    </div>

    <!-- 天气消息 -->
    <template v-if="data && data.weather">
      <div class="msg msg-left">
        <div class="msg-avatar" style="background:#e3f2fd;">🌤️</div>
        <div class="msg-body">
          <div class="msg-name">天气播报</div>
          <div class="msg-bubble">
            <div class="news-title" style="font-size:15px;">今日天气</div>
            <div class="news-content" style="margin-bottom:0;">
              🌊 珠海 {{ data.weather.zhuhai.temp }} {{ data.weather.zhuhai.desc }}<br>
              🏙️ 深圳 {{ data.weather.shenzhen.temp }} {{ data.weather.shenzhen.desc }}<br>
              🏖️ 汕头 {{ data.weather.shantou.temp }} {{ data.weather.shantou.desc }}
            </div>
          </div>
        </div>
      </div>
      <div class="msg msg-right">
        <div class="msg-avatar" style="background:#ffe4e8;">🌸</div>
        <div class="msg-body">
          <div class="msg-name">小茉霓</div>
          <div class="msg-bubble">
            <div class="comment-text">{{ data.weatherTip }}<span class="speak-icon" @click="speak($event.target)">📢 ))</span></div>
          </div>
        </div>
      </div>
    </template>

    <!-- 头条 -->
    <template v-if="data && data.headline">
      <div class="msg msg-left">
        <div class="msg-avatar" style="background:#fce4ec;">📢</div>
        <div class="msg-body">
          <div class="msg-name">头条频道</div>
          <div class="msg-bubble">
            <div class="news-title">{{ data.headline.title }}</div>
            <div class="news-content">{{ data.headline.content }}</div>
            <a class="news-link" v-if="data.headline.url" @click="openPanel(data.headline.url)">🔗 查看原文</a>
          </div>
        </div>
      </div>
      <div class="msg msg-right" v-if="data.headline.comment">
        <div class="msg-avatar" style="background:#ffe4e8;">🌸</div>
        <div class="msg-body">
          <div class="msg-name">小茉霓</div>
          <div class="msg-bubble">
            <div class="comment-text">{{ data.headline.comment }}<span class="speak-icon" @click="speak($event.target)">📢 ))</span></div>
          </div>
        </div>
      </div>
    </template>

    <!-- 各板块 -->
    <template v-for="section in (data ? data.sections : [])" :key="section.name">
      <template v-for="(article, idx) in section.articles" :key="article.id || idx">
        <!-- 板块发言 -->
        <div class="msg msg-left">
          <div class="msg-avatar" :style="{ background: avatarBg(normalizeEmoji(section)) }">{{ normalizeEmoji(section) }}</div>
          <div class="msg-body">
            <div class="msg-name">{{ section.name }}</div>
            <div class="msg-bubble">
              <div class="news-title">{{ article.title }}</div>
              <div class="news-content">{{ article.content }}</div>
              <a class="news-link" v-if="article.url" @click="openPanel(article.url)">🔗 查看原文</a>
            </div>
          </div>
        </div>
        <!-- 茉霓辣评 -->
        <div class="msg msg-right" v-if="article.comment">
          <div class="msg-avatar" style="background:#ffe4e8;">🌸</div>
          <div class="msg-body">
            <div class="msg-name">小茉霓</div>
            <div class="msg-bubble">
              <div class="comment-text">{{ article.comment }}<span class="speak-icon" @click="speak($event.target)">📢 ))</span></div>
            </div>
          </div>
        </div>
      </template>

      <!-- 娱乐快讯 brief items -->
      <template v-if="section.isBrief && section.items">
        <template v-for="(item, idx) in section.items" :key="item.id || idx">
          <div class="msg msg-left">
            <div class="msg-avatar" :style="{ background: avatarBg(normalizeEmoji(section)) }">{{ normalizeEmoji(section) }}</div>
            <div class="msg-body">
              <div class="msg-name">{{ section.name }}</div>
              <div class="msg-bubble">
                <div class="news-title">{{ item.title }}</div>
                <div class="news-content">{{ item.content }}</div>
                <a class="news-link" v-if="item.url" @click="openPanel(item.url)">🔗 查看原文</a>
              </div>
            </div>
          </div>
        </template>
        <!-- 茉霓固定回复 -->
        <div class="msg msg-right">
          <div class="msg-avatar" style="background:#ffe4e8;">🌸</div>
          <div class="msg-body">
            <div class="msg-name">小茉霓</div>
            <div class="msg-bubble">
              <div class="comment-text">哦，知道了<span class="speak-icon" @click="speak($event.target)">📢 ))</span></div>
            </div>
          </div>
        </div>
      </template>
    </template>

    <!-- 加载动画 -->
    <div v-if="loading" class="chat-loading">
      <div class="loading-emoji">💬</div>
      <p>正在加载聊天记录...</p>
    </div>
    <!-- 错误 -->
    <div v-if="!loading && error" style="text-align:center;padding:60px;color:var(--accent);">{{ error }}</div>

  </div>

  <!-- 回到顶部 -->
  <button class="back-to-top" id="backToTop" @click="scrollToTop">🔝</button>

  <!-- 新闻弹窗 -->
  <div class="news-overlay" id="panelOverlay" @click="closePanel"></div>
  <div class="news-panel" id="sidePanel">
    <iframe id="panelIframe" src="about:blank"></iframe>
  </div>

  <div class="speak-toast" id="speakToast"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="js/common.js"></script>
<script src="js/group.js"></script>

</body>
</html>
