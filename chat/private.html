<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌸 私聊</title>
<link rel="stylesheet" href="../css/chat.css">
<style>
  [v-cloak] { display: none !important; }
  body { background: #f0ebe2; }
</style>
</head>
<body>

<div id="app" v-cloak style="display:flex;flex-direction:column;height:100vh;background:#f0ebe2;position:relative;">

  <div class="chat-detail" id="chatDetail">

    <!-- 操作栏 -->
    <div class="detail-actions">
      <button class="action-btn" :class="{ 'scroll-hidden': !scrolled }" @click="scrollToTop">🔝</button>
      <button class="action-btn" @click="toggleCalendar">📅</button>
    </div>

    <!-- 按期数倒序渲染 -->
    <template v-for="edition in editions" :key="edition.date">
      <div class="date-separator" :data-date="edition.date"><span>{{ formatDate(edition.date) }} · {{ edition.weekday }}</span></div>

      <template v-for="(article, idx) in edition.articles" :key="idx">
        <!-- 板块发言 -->
        <div class="msg msg-left">
          <div class="msg-avatar" :style="{ background: avatarColor }">{{ avatar }}</div>
          <div class="msg-body">
            <div class="msg-name">{{ sectionName }}</div>
            <div class="msg-bubble">
              <div class="news-title">{{ article.title }}</div>
              <div class="news-content">{{ article.content }}</div>
              <a class="news-link" v-if="article.url" @click="openPanel(article.url)">🔗 查看原文</a>
            </div>
          </div>
        </div>
        <!-- 茉霓辣评 -->
        <div class="msg msg-right" v-if="article.comment">
          <div class="msg-avatar" style="background:#ffe4e8;">🌸</div>
          <div class="msg-body">
            <div class="msg-name">小茉霓</div>
            <div class="msg-bubble">
              <div class="comment-text">{{ article.comment }}<span class="speak-icon" @click="speak($event.target)">📢 ))</span></div>
            </div>
          </div>
        </div>
      </template>

      <!-- 娱乐快讯固定回复 -->
      <div class="msg msg-right" v-if="sectionName === '娱乐快讯'">
        <div class="msg-avatar" style="background:#ffe4e8;">🌸</div>
        <div class="msg-body">
          <div class="msg-name">小茉霓</div>
          <div class="msg-bubble">
            <div class="comment-text">哦，知道了<span class="speak-icon" @click="speak($event.target)">📢 ))</span></div>
          </div>
        </div>
      </div>
    </template>

    <div v-if="loading" class="chat-loading">
      <div class="loading-emoji">💬</div>
      <p>正在加载聊天记录...</p>
    </div>
    <div v-if="!loading && error" style="text-align:center;padding:60px;color:var(--accent);">{{ error }}</div>

  </div>

  <!-- 日历面板（在 #app 内、.chat-detail 外，避免被滚动影响） -->
  <div class="cal-overlay" v-if="showCal" @click="showCal = false"></div>
  <div class="cal-panel" v-if="showCal">
    <div class="cal-header">
      <button class="cal-nav" @click="prevMonth">&#8249;</button>
      <span class="cal-title">{{ calYear }}年{{ calMonth + 1 }}月</span>
      <button class="cal-nav" @click="nextMonth">&#8250;</button>
    </div>
    <div class="cal-weekdays">
      <span v-for="d in ['日','一','二','三','四','五','六']" :key="d">{{ d }}</span>
    </div>
    <div class="cal-grid">
      <button v-for="(cell, i) in calCells" :key="i"
              class="cal-day"
              :class="{ empty: !cell.day, has: cell.hasArticle, today: cell.isToday }"
              :disabled="!cell.hasArticle"
              @click="cell.hasArticle && jumpToDate(cell.dateStr)">
        {{ cell.day || '' }}
        <span class="cal-dot" v-if="cell.hasArticle"></span>
      </button>
    </div>
  </div>

  <div class="news-overlay" id="panelOverlay" @click="closePanel"></div>
  <div class="news-panel" id="sidePanel">
    <iframe id="panelIframe" src="about:blank"></iframe>
  </div>

  <div class="speak-toast" id="speakToast"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="../js/common.js"></script>
<script src="../js/private.js"></script>

</body>
</html>
